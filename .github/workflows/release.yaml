---
name: release

# Build + push images to GHCR on every push to main (rolling :main + :sha-…
# tags) and on every semver tag (:vX.Y.Z + :X.Y + :latest). Tagged releases
# also publish the Helm chart as an OCI artifact and sign the image with
# cosign keyless.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write     # ghcr.io push
  id-token: write     # cosign keyless signing via OIDC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: build & push image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: setup QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging policy:
          #   push to main   → :main, :sha-abc1234
          #   tag v1.2.3     → :1.2.3, :1.2, :1, :latest
          #   PRs (if any)   → :pr-N
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=natsie
            org.opencontainers.image.description=Swiss-army knife for NATS operations
            org.opencontainers.image.vendor=1995parham
            org.opencontainers.image.licenses=GPL-3.0-only
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md

      - name: build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamps internal/version.Version so `natsie --version` reports
          # the tag (e.g. "v1.2.3"). For non-tag pushes github.ref_name is
          # the branch name ("main") — useful for "I'm on rolling main".
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign:
    name: sign image (cosign)
    runs-on: ubuntu-latest
    needs: image
    if: github.event_name != 'pull_request'
    steps:
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: keyless sign image
        env:
          TAGS: ${{ needs.image.outputs.tags }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          # cosign keyless signs every tag we just pushed using the
          # workflow's OIDC token. SBOM + provenance attestations are
          # produced by the build job (sbom: true, provenance: mode=max).
          for tag in $TAGS; do
            ref="${tag%:*}@${DIGEST}"
            echo "::group::cosign sign $ref"
            cosign sign --yes "$ref"
            echo "::endgroup::"
          done

  chart:
    name: publish Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: chart present?
        id: chart
        run: |
          if [ -d chart/natsie-chart ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: setup helm
        if: steps.chart.outputs.present == 'true'
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: log in to ghcr.io (helm registry)
        if: steps.chart.outputs.present == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: package chart
        if: steps.chart.outputs.present == 'true'
        run: |
          # Sync chart appVersion to the released tag (strip leading 'v').
          version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^appVersion:.*/appVersion: \"${version}\"/" chart/natsie-chart/Chart.yaml
          helm package chart/natsie-chart --destination dist

      - name: push chart to ghcr.io
        # Result: ghcr.io/<owner>/natsie-chart:<version>
        if: steps.chart.outputs.present == 'true'
        run: |
          helm push dist/natsie-chart-*.tgz oci://ghcr.io/${{ github.repository_owner }}
