---
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: extractions/setup-just@v4
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: build
        run: go build ./...

      - run: just test

      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: 1995parham/natsie

  docker:
    name: docker / build (smoke test)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: natsie:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: helm / lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: chart present?
        id: chart
        run: |
          if [ -d chart/natsie-chart ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: setup helm
        if: steps.chart.outputs.present == 'true'
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: helm lint
        if: steps.chart.outputs.present == 'true'
        run: helm lint chart/natsie-chart

      - name: helm template (defaults)
        if: steps.chart.outputs.present == 'true'
        run: helm template natsie chart/natsie-chart > /dev/null
