# Default values for the natsie chart.

# ---- image -----------------------------------------------------------------
image:
  repository: ghcr.io/1995parham/natsie
  # Override the image tag (defaults to .Chart.AppVersion when empty).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---- naming ----------------------------------------------------------------
nameOverride: natsie
fullnameOverride: ""

# ---- workload --------------------------------------------------------------
# natsie is single-writer: the scheduler, file store, and audit log all
# assume one process. Don't scale beyond 1.
replicaCount: 1

# Recreate (not RollingUpdate) because the PVC has accessMode
# ReadWriteOnce and two pods can't mount it simultaneously.
strategy:
  type: Recreate

revisionHistoryLimit: 5

priorityClassName: ""

# ---- serviceAccount --------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
  # natsie does not call the Kubernetes API.
  automountServiceAccountToken: false

# ---- pod security ----------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  capabilities:
    drop:
      - ALL

# ---- resources -------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

# ---- probes ----------------------------------------------------------------
# All three probes hit /healthz on the HTTP port.
probes:
  startup:
    enabled: true
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 2
  readiness:
    enabled: true
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  liveness:
    enabled: true
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# ---- scheduling ------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

# ---- networking ------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# Two ingress mechanisms; don't enable both with the same hostname.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: natsie.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpProxy:
  enabled: false
  ingressClassName: ""
  fqdn: ""
  annotations: {}
  tls:
    secretName: ""
    enableFallbackCertificate: true
  routes: []

# NetworkPolicy is opt-in.
networkPolicy:
  enabled: false
  ingress:
    fromNamespaceSelector: {}
    fromPodSelector: {}
  egress:
    natsCidrs: []
    natsPorts:
      - 4222
    allowDNS: true

# ---- persistence -----------------------------------------------------------
# natsie writes the manifest store, audit log, and any future state into a
# single PVC. accessMode must be ReadWriteOnce because the strategy is
# Recreate and only one pod ever mounts at a time.
persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClassName: ""
  annotations: {}
  # When false the chart will use an emptyDir instead (lose state on pod restart).

# ---- NATS context files ---------------------------------------------------
# natsie dials NATS clusters via files at ~/.config/nats/context/<name>.json
# (the same store the official `nats context` CLI uses). Three ways to
# supply the files — pick exactly one.
#
#   1. inline: chart-managed Secret built from the literal JSON content.
#      natsContexts.inline:
#        - name: snapp-js-main-teh1
#          content: |
#            { "url": "nats://...", "user": "...", "password": "..." }
#
#   2. existingSecret: operator-managed Secret already in the namespace.
#      natsContexts.existingSecret: my-nats-contexts
#
#   3. fromEnv: init container renders the JSON files at pod startup from
#      env vars sourced from an existing Secret (e.g. a NATS operator's
#      system-account Secret that you don't own). Each context names
#      the URL inline and points at the {user,password} keys in the Secret.
#
#      natsContexts.fromEnv:
#        enabled: true
#        contexts:
#          - name: snapp-js-main-teh1
#            url: nats://js-nats-production.nats-production.svc.cluster.local:4222
#            secret:
#              name: nats-system-account
#              userKey: admin_username
#              passwordKey: admin_password
#
natsContexts:
  inline: []
  existingSecret: ""
  fromEnv:
    enabled: false
    # Image used by the init container. busybox sh is enough to write the
    # JSON files; override if you have a stricter image policy.
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent
    contexts: []

# ---- application config ---------------------------------------------------
# Each entry below is rendered into the bot config.yaml the daemon reads.
defaults:
  minPending: 0
  minIdle: 24h
  format: tsv

contexts: {}
# Pre-declare cluster topology so the bot doesn't need a --peer-context
# flag on every invocation. Example:
#   contexts:
#     snapp-js-main-teh1:
#       peer: snapp-js-main-teh2

bot:
  # Each entry becomes a [[schedules]] in config.yaml. `kind` selects the
  # job: omit it (or "consumer-stale") for the stale-consumer cleanup scan;
  # "stream-unlimited" for a notify-only report of streams with no retention
  # limit (no manifest, no approval).
  schedules: []
  # - name: daily
  #   cron: "0 3 * * *"
  #   context: snapp-js-main-teh1
  #   peerContext: snapp-js-main-teh2
  #   minPending: 10000
  #   minIdle: 24h
  # - name: unlimited-streams
  #   cron: "0 6 * * *"
  #   kind: stream-unlimited
  #   context: snapp-js-main-teh1

  # Notify URLs. URLs may contain secrets — if you don't want them in the
  # ConfigMap, set `bot.notifySecret` to a Secret whose `urls` key holds a
  # newline-separated list. When `notifySecret` is set, `bot.notify` is
  # ignored and an env var (NATSIE_BOT__NOTIFY) reads from the Secret.
  notify: []
  # - stdout://
  # - mattermost://chat.example.com/hooks/abc-xyz?channel=nats-cleanup
  notifySecret: ""

  # Owner routing — each entry becomes a [[bot.owners]] in config.yaml.
  owners: []
  # - name: chronos
  #   streams: [rides]
  #   consumerPrefix: [chronos-]
  #   notify:
  #     - mattermost://chat.example.com/hooks/team-chronos

  # Public URL used to build /manifest/<id> and /approve/<id> links in
  # chat messages. Leave empty when ingress.enabled = false.
  baseUrl: ""

  # signing_key gates the /slash + /approve endpoints. One of:
  #   signingKey: <inline string>           # chart-managed Secret
  #   existingSigningKeySecret:             # operator-managed Secret
  #     name: natsie-signing-key
  #     key: signing_key
  signingKey: ""
  existingSigningKeySecret: {}

  # Pull-mode chat listener. natsie opens an outbound WebSocket to the
  # Mattermost server using a bot-account token — useful when the chat
  # server can't POST to the bot (no slash-command support, the bot is
  # behind a private ingress, or there's no public URL at all).
  #
  # Supply the token via either an inline value (chart-managed Secret)
  # or an existing Secret already in the namespace. The bot reads the
  # token from an env var sourced from that Secret at runtime; it never
  # appears in the rendered ConfigMap.
  mattermost:
    enabled: false
    server: ""           # https://chat.example.com (no trailing slash)
    team: ""             # team slug the channel lives on
    channel: ""          # channel name (no leading #)
    trigger: "!natsie"   # bang-prefix the bot reacts to
    token: ""            # inline → chart-managed Secret
    existingTokenSecret: {}
    # existingTokenSecret:
    #   name: natsie-mattermost-token
    #   key: token

  # /var/lib/natsie paths live inside the PVC. Adjust only if you change
  # the mount.
  storePath: /var/lib/natsie/manifests
  auditLogPath: /var/lib/natsie/audit.jsonl

# Extra escape hatches.
extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []
extraContainers: []
initContainers: []

# Rolls the Deployment when the rendered ConfigMap content changes.
restartOnConfigChange: true
