apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "natsie-chart.fullname" . }}
  labels:
    {{- include "natsie-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "natsie-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "natsie-chart.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.restartOnConfigChange }}
        checksum/config: {{ include "natsie-chart.configYaml" . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "natsie-chart.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "natsie-chart.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - bot
            - serve
            - --config
            - /etc/natsie/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- if or (eq (include "natsie-chart.hasManagedSigningKey" .) "true") .Values.bot.existingSigningKeySecret.name }}
            - name: NATSIE_BOT__SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.bot.existingSigningKeySecret.name }}
                  name: {{ .Values.bot.existingSigningKeySecret.name }}
                  key: {{ .Values.bot.existingSigningKeySecret.key | default "signing_key" }}
                  {{- else }}
                  name: {{ include "natsie-chart.secretName" . }}
                  key: signing_key
                  {{- end }}
            {{- end }}
            {{- if .Values.bot.notifySecret }}
            - name: NATSIE_BOT__NOTIFY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bot.notifySecret }}
                  key: urls
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/natsie/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if or .Values.natsContexts.existingSecret (eq (include "natsie-chart.hasManagedNatsContexts" .) "true") }}
            - name: nats-contexts
              mountPath: /home/nonroot/.config/nats/context
              readOnly: true
            {{- end }}
            - name: state
              mountPath: /var/lib/natsie
            # readOnlyRootFilesystem is true, so anything the binary writes
            # outside of /var/lib/natsie has to land on an emptyDir.
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "natsie-chart.configMapName" . }}
        {{- if or .Values.natsContexts.existingSecret (eq (include "natsie-chart.hasManagedNatsContexts" .) "true") }}
        - name: nats-contexts
          secret:
            secretName: {{ include "natsie-chart.natsCtxSecretEffective" . }}
            defaultMode: 0400
        {{- end }}
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "natsie-chart.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
