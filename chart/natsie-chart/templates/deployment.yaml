apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "natsie-chart.fullname" . }}
  labels:
    {{- include "natsie-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "natsie-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "natsie-chart.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.restartOnConfigChange }}
        checksum/config: {{ include "natsie-chart.configYaml" . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "natsie-chart.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.initContainers (and .Values.natsContexts.fromEnv.enabled .Values.natsContexts.fromEnv.contexts) }}
      initContainers:
        {{- if and .Values.natsContexts.fromEnv.enabled .Values.natsContexts.fromEnv.contexts }}
        - name: render-nats-contexts
          image: {{ printf "%s:%s" .Values.natsContexts.fromEnv.image.repository .Values.natsContexts.fromEnv.image.tag }}
          imagePullPolicy: {{ .Values.natsContexts.fromEnv.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Make the file world-readable up front. The main container
              # runs as a different uid than busybox's `cat` default
              # (busybox writes mode 0600 in some SCC contexts), so an
              # explicit umask + chmod is the only way to guarantee the
              # nonroot natsie user can open the file.
              umask 0022
              mkdir -p /shared
              {{- range $i, $c := .Values.natsContexts.fromEnv.contexts }}
              cat > /shared/{{ $c.name }}.json <<EOF
              {
                "url": "{{ $c.url }}",
                "user": "${CTX_{{ $i }}_USER}",
                "password": "${CTX_{{ $i }}_PASSWORD}"
              }
              EOF
              chmod 0644 /shared/{{ $c.name }}.json
              {{- end }}
          env:
            {{- range $i, $c := .Values.natsContexts.fromEnv.contexts }}
            - name: CTX_{{ $i }}_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $c.secret.name }}
                  key: {{ $c.secret.userKey }}
            - name: CTX_{{ $i }}_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $c.secret.name }}
                  key: {{ $c.secret.passwordKey }}
            {{- end }}
          volumeMounts:
            - name: nats-contexts
              mountPath: /shared
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "natsie-chart.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - bot
            - serve
            - --config
            - /etc/natsie/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # natsctx looks up ~/.config/nats/context/<name>.json via
            # os.UserHomeDir(). distroless/static-debian12:nonroot leaves
            # HOME unset, so the lookup falls back to "/" and misses the
            # mount point. Pin HOME explicitly.
            - name: HOME
              value: /home/nonroot
            {{- if or (eq (include "natsie-chart.hasManagedSigningKey" .) "true") .Values.bot.existingSigningKeySecret.name }}
            - name: NATSIE_BOT__SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.bot.existingSigningKeySecret.name }}
                  name: {{ .Values.bot.existingSigningKeySecret.name }}
                  key: {{ .Values.bot.existingSigningKeySecret.key | default "signing_key" }}
                  {{- else }}
                  name: {{ include "natsie-chart.secretName" . }}
                  key: signing_key
                  {{- end }}
            {{- end }}
            {{- if .Values.bot.notifySecret }}
            - name: NATSIE_BOT__NOTIFY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bot.notifySecret }}
                  key: urls
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/natsie/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if or .Values.natsContexts.existingSecret (eq (include "natsie-chart.hasManagedNatsContexts" .) "true") }}
            - name: nats-contexts
              mountPath: /home/nonroot/.config/nats/context
              readOnly: true
            {{- else if and .Values.natsContexts.fromEnv.enabled .Values.natsContexts.fromEnv.contexts }}
            - name: nats-contexts
              mountPath: /home/nonroot/.config/nats/context
              readOnly: true
            {{- end }}
            - name: state
              mountPath: /var/lib/natsie
            # readOnlyRootFilesystem is true, so anything the binary writes
            # outside of /var/lib/natsie has to land on an emptyDir.
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "natsie-chart.configMapName" . }}
        {{- if or .Values.natsContexts.existingSecret (eq (include "natsie-chart.hasManagedNatsContexts" .) "true") }}
        - name: nats-contexts
          secret:
            secretName: {{ include "natsie-chart.natsCtxSecretEffective" . }}
            defaultMode: 0400
        {{- else if and .Values.natsContexts.fromEnv.enabled .Values.natsContexts.fromEnv.contexts }}
        - name: nats-contexts
          emptyDir:
            sizeLimit: 1Mi
        {{- end }}
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "natsie-chart.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
